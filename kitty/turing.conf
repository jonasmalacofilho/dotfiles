# Configuration overrides for Turing (macOS)

# Use left option as alt for better compatibility with portable terminal
# programs, but leave right option as a native macOS Option so its
# compose/dead-key accents (Option+e, Option+n, ...) still work in kitty.
macos_option_as_alt left

# Translate Command+arrow into the line/document keys every terminal program already handles.
#
# The kanata nav layer's f modifier is Cmd on macOS (f+h/l = line edge, f+k/j = document edge), but
# kitty forwards cmd+left/right as super+arrow (which nvim and the shells don't bind) and consumes
# cmd+up/down for scroll_line_up/down, so the nav layer's f motions otherwise do nothing useful
# here. send_key re-encodes each target key for whatever the focused app negotiated -- legacy for
# the shells, the kitty keyboard protocol for nvim -- so each receives a form it understands:
#
#   f+h / f+l  (cmd+left / cmd+right) -> Home / End           = start / end of line
#   f+k / f+j  (cmd+up   / cmd+down)  -> Ctrl+Home / Ctrl+End = start / end of document (nvim gg / G)
#
# This repurposes the physical cmd+arrow keys too (kitty can't tell nav-f from a real Cmd press) and
# gives up kitty's cmd+up/down line scroll; rebind that to kitty_mod+up/down if it's missed.
map cmd+left  send_key home
map cmd+right send_key end
map cmd+up    send_key ctrl+home
map cmd+down  send_key ctrl+end

# Background blur is supported, so use background transparency by default.
background_opacity 0.75

# Windows look weird without the native decorations.
hide_window_decorations false

# But use the background color instead of the system default on the titlebar.
macos_titlebar_color background

# The built-in screen is small, so start with space for a single window.
initial_window_width 120c

# Text configuration (calt check: |-|).
font_family      family='Fira Code' style=FiraCodeRoman-Regular variable_name=FiraCodeRoman
bold_font        auto
italic_font      auto
bold_italic_font auto

# Better font sizes (see ./cell-sweep.sh and ./turing-built-in-fira.out).
font_size        11.25
map kitty_mod+equal       change_font_size current +0.8250
map kitty_mod+minus       change_font_size current -0.8250
map kitty_mod+kp_add      change_font_size current +1.650
map kitty_mod+kp_subtract change_font_size current -1.650
