# Configuration overrides for Turing (macOS)

# Background blur is supported, so use background transparency by default.
background_opacity 0.75

# Windows look weird without the native decorations.
hide_window_decorations false

# But use the background color instead of the system default on the titlebar.
macos_titlebar_color background

# No need to complicate font sizes on macOS, everything is rendered at 144 (or 72) DPI.
map kitty_mod+equal       change_font_size current +1.0
map kitty_mod+minus       change_font_size current -1.0
map kitty_mod+kp_add      change_font_size current +2.0
map kitty_mod+kp_subtract change_font_size current -2.0

# Font settings
font_size 10
