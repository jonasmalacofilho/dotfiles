enabled_layouts tall:bias=50,fat:bias=55,tall:bias=75,tall:bias=68,vertical,horizontal,grid,stack

# Performance knobs
repaint_delay 10
input_delay 3
sync_to_monitor no

# Font configuration.
#
# See `./cell-sweep.sh` and `./sample.txt`.

# font_family             family=Iosevka
# # Disable italics otherwise "M" gets cut.
# italic_font             family=Iosevka style=Regular
# bold_italic_font        family=Iosevka style=Bold
# map kitty_mod+equal     change_font_size current +1.50
# map kitty_mod+minus     change_font_size current -1.50
# font_size               10.12
# # ttc-iosevka (w/h ≈ 0.4)

font_family             Fira Code
map kitty_mod+equal     change_font_size current +1.22
map kitty_mod+minus     change_font_size current -1.22
font_size               9.44
# ttf-fira-code (w/h ≈ 0.5)

# font_family             JetBrains Mono
