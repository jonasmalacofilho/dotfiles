# Configuration overrides for Calvin (Linux/GNOME).

# Large screen/resolution, can comfortably fit 4 OS windows, each with 2 columns.
initial_window_height 55c
initial_window_width 240c
enabled_layouts fat:bias=55,vertical,tall:bias=75,grid,tall:bias=50,horizontal

# On Wayland, if ibus is installed, it takes precedence over Kitty's unicode_input for the
# `ctrl+shift+u` shortcut. (This doesn't happen on X11).
wayland_enable_ime no

# Hide the titlebar since it's not very useful or matches GNOME's visuals.
hide_window_decorations titlebar-only
# # Otherwise...
# wayland_titlebar_color background
# # and change the placement strategy to compensate for the titlebar.
# placement_strategy bottom

# Performance knobs.
sync_to_monitor no

# Font configuration.
#
# See `./cell-sweep.sh` and `./sample.txt`.

# font_family             family=Iosevka
# # Disable italics otherwise "M" gets cut.
# italic_font             family=Iosevka style=Regular
# bold_italic_font        family=Iosevka style=Bold
# map kitty_mod+equal     change_font_size current +1.50
# map kitty_mod+minus     change_font_size current -1.50
# font_size               10.12
# # ttc-iosevka (w/h ≈ 0.4)

# font_family             Fira Code
# map kitty_mod+equal     change_font_size current +1.22
# map kitty_mod+minus     change_font_size current -1.22
# font_size               9.44
# # ttf-fira-code (w/h ≈ 0.5)

# font_family             JetBrains Mono
# map kitty_mod+equal     change_font_size current +1.25
# map kitty_mod+minus     change_font_size current -1.25
# font_size               9.69
# # ttf-jetbrains-mono (w/h ≈ 0.455)

font_family             family='Monaspace Krypton Frozen' postscript_name=MonaspaceKryptonFrozen-Regular
# Disable italics because they don't match an OCR-style font.
italic_font             postscript_name=MonaspaceKryptonFrozen-Regular
bold_italic_font        postscript_name=MonaspaceKryptonFrozen-Bold
map kitty_mod+equal     change_font_size current +1.20
map kitty_mod+minus     change_font_size current -1.20
font_size               9.31
# ttf-monaspace-frozen (w/h ≈ 0.5)

# # Disable ligatures because `&&` doesn't render correctly.
# #   https://github.com/larsenwork/monoid/issues/235
